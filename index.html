<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FI Radar - Real-Time Flight Tracking over Finland</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Leaflet Map Container -->
        <div id="map"></div>
        
        <!-- UI Side Panel -->
        <div id="side-panel">
            <header>
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L2.5 8l6.4 3.3L6 14l-4-1-1 1 3 4 4 3 1-1-1-4 2.7-2.9 3.3 6.4 1.2-1.2c.4-.2.7-.6.6-1.1z"></path></svg>
                    <h1>FI Radar</h1>
                </div>
                <div class="status" title="Connecting to OpenSky Network...">
                    <span class="indicator" id="live-indicator"></span> 
                    <span id="connection-status">Live</span>
                </div>
            </header>
            
            <!-- Global Stats -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-label">Airborne over FI</div>
                    <div class="stat-value" id="total-flights">--</div>
                </div>
                <div class="stat-card toggle-card">
                    <div class="stat-label">Weather Radar</div>
                    <div class="weather-controls">
                        <label class="switch">
                            <input type="checkbox" id="weather-toggle">
                            <span class="slider round"></span>
                        </label>
                        <button id="rain-play-pause" class="icon-btn hidden" title="Play Animation">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Weather Info (Legend & Time) -->
            <div id="weather-info" class="hidden">
                <div class="radar-time-container">
                    <span class="detail-label">Radar Time</span>
                    <span id="radar-timestamp" class="detail-value">--:--</span>
                </div>
                <div class="weather-legend">
                    <div class="legend-bar"></div>
                    <div class="legend-labels">
                        <span>Light</span>
                        <span>Heavy</span>
                    </div>
                </div>
            </div>

            <!-- Selected Flight Details -->
            <div id="selected-flight" class="hidden">
                <h2>Selected Aircraft</h2>
                <div class="flight-detail">
                    <span class="detail-label">Callsign</span>
                    <span class="detail-value highlight" id="detail-callsign">--</span>
                </div>
                <div class="flight-detail">
                    <span class="detail-label">Origin Country</span>
                    <span class="detail-value" id="detail-country">--</span>
                </div>
                <div class="flight-detail">
                    <span class="detail-label">Altitude</span>
                    <span class="detail-value" id="detail-altitude">--</span>
                </div>
                <div class="flight-detail">
                    <span class="detail-label">Ground Speed</span>
                    <span class="detail-value" id="detail-velocity">--</span>
                </div>
                <div class="flight-detail">
                    <span class="detail-label">Heading</span>
                    <span class="detail-value" id="detail-heading">--</span>
                </div>
                <div class="flight-detail">
                    <span class="detail-label">Vertical Rate</span>
                    <span class="detail-value" id="detail-vrate">--</span>
                </div>
            </div>
            
            <!-- Footer Information -->
            <div class="updates">
                <p>Data provided by <a href="https://opensky-network.org" target="_blank">OpenSky Network</a> & <a href="https://www.rainviewer.com/api.html" target="_blank">RainViewer</a></p>
                <p>Last updated: <span id="last-updated">--:--:--</span></p>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="app.js?v=1.1"></script>
</body>
</html>
